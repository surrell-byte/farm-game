<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Farm World ESL | Premium Animal Learning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(135deg, #8ec63f, #3f8a2e);
      font-family: 'Segoe UI', 'Poppins', 'Comic Neue', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 550px;
      margin: 0 auto;
      animation: fadeIn 0.3s ease;
    }

    .active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    .farm-card {
      background: rgba(255, 251, 235, 0.98);
      backdrop-filter: blur(2px);
      border-radius: 70px 50px 70px 50px;
      padding: 30px 24px 40px;
      box-shadow: 0 30px 35px rgba(0, 0, 0, 0.25), 0 0 0 2px #fff8e7, 0 0 0 5px #f3b33d;
      text-align: center;
      transition: 0.2s;
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #f5b042, #c97e2a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    h2 {
      color: #4b2f14;
      margin-bottom: 15px;
    }

    p {
      color: #5e3a1f;
      font-weight: 500;
      margin-bottom: 20px;
    }

    input {
      width: 85%;
      padding: 14px 18px;
      border-radius: 60px;
      border: none;
      background: #fff5e6;
      font-size: 1rem;
      margin: 15px 0 10px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.05), 0 2px 3px rgba(0,0,0,0.1);
      text-align: center;
      font-weight: bold;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      box-shadow: 0 0 0 3px #ffbc6e;
      background: white;
    }

    button {
      background: #ffb347;
      border: none;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 12px 24px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.15s;
      color: #2c2b26;
      box-shadow: 0 5px 0 #a45d2e;
      margin: 8px;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #a45d2e;
    }

    #levels button {
      display: block;
      width: 100%;
      margin: 12px 0;
      background: #ffdd99;
      font-size: 1.2rem;
      padding: 14px;
    }

    .locked {
      background: #b0aa99 !important;
      box-shadow: 0 5px 0 #6b5a44 !important;
      cursor: not-allowed;
      opacity: 0.7;
      pointer-events: none;
      filter: grayscale(0.1);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      background: #fef0db;
      padding: 10px 18px;
      border-radius: 100px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .score-box, .q-counter {
      background: #fff2df;
      padding: 4px 14px;
      border-radius: 40px;
      color: #b45f1b;
    }

    .emoji {
      font-size: 110px;
      background: #fff7e8;
      border-radius: 80px;
      padding: 18px 15px;
      margin: 12px auto 20px;
      width: fit-content;
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.1),
                  inset 0 0 0 4px white,
                  inset 0 0 0 7px #ffdd99;
      transition: 0.3s;
      filter: blur(12px);
    }

    .reveal {
      filter: blur(0);
      transform: scale(1.05);
      box-shadow:
        0 0 0 6px #fff8c4,
        0 0 20px rgba(255, 215, 0, 0.6),
        0 18px 30px rgba(0,0,0,0.2);
    }

    #hintBtn {
      background: #ffd27f;
      font-size: 0.9rem;
      padding: 8px 14px;
      margin-top: -10px;
      margin-bottom: 10px;
      box-shadow: 0 3px 0 #b97f2e;
    }

    .sound-btn {
      background: #ffe0a3;
      font-size: 1.1rem;
      padding: 12px 18px;
      width: 85%;
      margin: 5px auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 15px 0;
    }

    .option {
      background: #f3f0e7;
      border: 2px solid #e9dbc9;
      padding: 14px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }

    .option:hover {
      background: #ffe3b5;
      transform: scale(0.98);
    }

    .correct {
      background: #2b7e3a !important;
      border-color: #f9e45b !important;
      color: white !important;
      pointer-events: none;
    }

    .wrong {
      background: #c93a2b !important;
      border-color: #ffb4a2 !important;
      color: white !important;
      animation: shakeBad 0.28s;
      pointer-events: none;
    }

    @keyframes shakeBad {
      0% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    .message {
      background: #fff0cf;
      border-radius: 40px;
      padding: 12px;
      margin: 12px 0;
      font-weight: bold;
    }

    .menu-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
    }

    .menu-buttons button {
      background: #e0aa6e;
      flex: 1;
    }

    footer {
      font-size: 0.7rem;
      margin-top: 20px;
      color: #4b2a10;
    }
  </style>
</head>
<body>

<!-- LANDING SCREEN -->
<div id="landing" class="screen active">
  <div class="farm-card">
    <h1>🐄 FARM WORLD</h1>
    <p>Learn Animal Vocabulary 🌾</p>
    <input type="text" id="playerName" placeholder="Enter your name..." autocomplete="off">
    <button id="startBtn">Start Game 🚜</button>
    <footer>🐣 Listen, guess, unlock levels!</footer>
  </div>
</div>

<!-- MAIN MENU -->
<div id="menu" class="screen">
  <div class="farm-card">
    <h2>Welcome, <span id="displayName">Farmer</span> 👋</h2>
    <p>🐓 Choose your challenge 🐖</p>
    <div id="levels"></div>
    <footer>⭐ Complete a level to unlock the next!</footer>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div class="farm-card" style="padding: 25px 20px;">
    <div class="stats">
      <div class="score-box">🌟 SCORE <span id="scoreDisplay">0</span></div>
      <div class="q-counter">📖 QUEST <span id="currentQ">1</span> / <span id="totalQ">0</span></div>
    </div>

    <div id="emoji" class="emoji">🐄</div>
    <button id="hintBtn">👀 Peek</button>
    <button id="soundButton" class="sound-btn">🔊 HEAR ANIMAL SOUND</button>

    <div id="optionsContainer" class="options-grid"></div>
    <div id="messageArea" class="message">🐣 Tap the correct name!</div>

    <div class="menu-buttons">
      <button id="exitToMenuBtn">🏠 Main Menu</button>
    </div>
    <footer>🐑 Listen carefully & have fun!</footer>
  </div>
</div>

<script>
  // ======================== RELIABLE SOUNDS (ALL WORKING) ========================
  const animalPool = [
    { name: "Cow", emoji: "🐄", sound: "https://www.soundjay.com/animal/cow-moo-1.mp3" },
    { name: "Sheep", emoji: "🐑", sound: "https://www.soundjay.com/animal/sheep-bleat.mp3" },
    { name: "Duck", emoji: "🦆", sound: "https://www.soundjay.com/animal/duck-quack-1.mp3" },
    { name: "Goat", emoji: "🐐", sound: "https://www.soundjay.com/animal/goat-sound-effect.mp3" },
    { name: "Pig", emoji: "🐖", sound: "https://www.soundjay.com/animal/pig-sound-effect.mp3" },
    { name: "Chicken", emoji: "🐓", sound: "https://www.soundjay.com/animal/chicken-cluck-1.mp3" },
    { name: "Turkey", emoji: "🦃", sound: "https://www.soundjay.com/animal/turkey-sound-effect.mp3" },
    { name: "Donkey", emoji: "🫏", sound: "https://www.soundjay.com/animal/donkey-sound-effect.mp3" },
    { name: "Horse", emoji: "🐎", sound: "https://www.soundjay.com/animal/horse-sound-effect.mp3" },
    { name: "Dog", emoji: "🐕", sound: "https://www.soundjay.com/animal/dog-bark-1.mp3" }
  ];

  // Levels
  const levels = [
    { unlocked: true, name: "🐣 Barn Buddies", animals: ["Cow", "Sheep", "Duck", "Dog"] },
    { unlocked: false, name: "🐷 Pigpen Pals", animals: ["Pig", "Chicken", "Goat", "Donkey"] },
    { unlocked: false, name: "🏆 Pasture Masters", animals: ["Horse", "Turkey", "Donkey", "Cow"] }
  ];

  // Game state
  let playerName = "";
  let currentLevelIndex = 0;
  let currentQuestions = [];
  let currentQuestionIndex = 0;
  let currentScore = 0;
  let answered = false;
  let gameActive = false;
  let levelTimeout = null;
  let currentAudio = null;

  // DOM elements
  const displayNameSpan = document.getElementById("displayName");
  const levelsContainer = document.getElementById("levels");
  const emojiEl = document.getElementById("emoji");
  const optionsContainer = document.getElementById("optionsContainer");
  const messageArea = document.getElementById("messageArea");
  const scoreDisplaySpan = document.getElementById("scoreDisplay");
  const currentQSpan = document.getElementById("currentQ");
  const totalQSpan = document.getElementById("totalQ");
  const soundBtn = document.getElementById("soundButton");
  const exitToMenuBtn = document.getElementById("exitToMenuBtn");
  const startGameBtn = document.getElementById("startBtn");
  const hintBtn = document.getElementById("hintBtn");

  // Helpers
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function clearLevelTimeout() {
    if (levelTimeout) {
      clearTimeout(levelTimeout);
      levelTimeout = null;
    }
  }

  function stopCurrentAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
  }

  function clearPeekBlur() {
    if (emojiEl.style.filter === "blur(4px)") {
      emojiEl.style.filter = "";
    }
  }

  function showScreen(screenId) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(screenId).classList.add("active");
  }

  function renderLevels() {
    levelsContainer.innerHTML = "";
    levels.forEach((level, idx) => {
      const btn = document.createElement("button");
      btn.textContent = `🌾 ${level.name} (Level ${idx+1})`;
      if (!level.unlocked) {
        btn.classList.add("locked");
        btn.textContent += ` 🔒`;
      } else {
        btn.onclick = () => startLevel(idx);
      }
      levelsContainer.appendChild(btn);
    });
  }

  function startLevel(levelIndex) {
    if (!levels[levelIndex].unlocked) return;
    clearLevelTimeout();
    stopCurrentAudio();
    clearPeekBlur();
    
    currentLevelIndex = levelIndex;
    const levelData = levels[levelIndex];
    let rawQuestions = animalPool.filter(animal => levelData.animals.includes(animal.name));
    currentQuestions = shuffleArray([...rawQuestions]);
    
    // 🚫 DELETED preload section – no more audioPreloaded
    
    currentQuestionIndex = 0;
    currentScore = 0;
    answered = false;
    gameActive = true;

    updateGameStatsUI();
    loadQuestion();
    showScreen("gameScreen");
  }

  function updateGameStatsUI() {
    scoreDisplaySpan.textContent = currentScore;
    if (currentQuestions.length) {
      currentQSpan.textContent = currentQuestionIndex + 1;
      totalQSpan.textContent = currentQuestions.length;
    } else {
      currentQSpan.textContent = "0";
      totalQSpan.textContent = "0";
    }
  }

  function loadQuestion() {
    if (!gameActive) return;
    if (currentQuestionIndex >= currentQuestions.length) {
      finishLevel();
      return;
    }

    clearLevelTimeout();
    answered = false;
    clearPeekBlur();
    
    const q = currentQuestions[currentQuestionIndex];
    emojiEl.textContent = q.emoji;
    emojiEl.classList.remove("reveal");
    
    messageArea.innerHTML = "🐣 Which animal is this?";
    messageArea.style.background = "#fff0cf";

    // Dynamic options: correct + 2 random wrong
    const others = animalPool.filter(a => a.name !== q.name);
    const shuffledOthers = shuffleArray([...others]);
    const wrongNames = shuffledOthers.slice(0, 2).map(a => a.name);
    let options = [q.name, ...wrongNames];
    options = shuffleArray(options);

    optionsContainer.innerHTML = "";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.textContent = opt;
      btn.className = "option";
      btn.addEventListener("click", () => {
        if (!gameActive || answered) return;
        checkAnswer(btn, opt);
      });
      optionsContainer.appendChild(btn);
    });
    updateGameStatsUI();
  }

  // 🔥 FIXED: Create audio only on click – most reliable method
  function playSoundForCurrent() {
    if (!gameActive || currentQuestionIndex >= currentQuestions.length) {
      messageArea.innerHTML = "🎮 Select a level first!";
      return;
    }

    const q = currentQuestions[currentQuestionIndex];
    stopCurrentAudio();

    // Create fresh Audio element on every click
    currentAudio = new Audio(q.sound);

    currentAudio.play()
      .then(() => {
        console.log("Sound playing");
      })
      .catch(err => {
        console.warn("Playback failed:", err);
        messageArea.innerHTML = "🔊 Tap again to enable sound";
        // Reset message after 1.5s
        setTimeout(() => {
          if (gameActive && !answered && currentQuestionIndex < currentQuestions.length) {
            messageArea.innerHTML = "🐣 Which animal is this?";
          }
        }, 1500);
      });
  }

  function checkAnswer(button, selected) {
    if (!gameActive || answered) return;
    const currentQ = currentQuestions[currentQuestionIndex];
    const isCorrect = (selected === currentQ.name);

    if (isCorrect) {
      stopCurrentAudio();
      clearPeekBlur();
      answered = true;
      currentScore++;
      updateGameStatsUI();
      button.classList.add("correct");
      emojiEl.classList.add("reveal");
      
      messageArea.innerHTML = "✅ PERFECT! +1 POINT 🎉";
      messageArea.style.background = "#c8f0d1";

      document.querySelectorAll(".option").forEach(btn => {
        btn.style.pointerEvents = "none";
        btn.disabled = true;
      });

      clearLevelTimeout();
      levelTimeout = setTimeout(() => {
        levelTimeout = null;
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
          loadQuestion();
        } else {
          finishLevel();
        }
      }, 1300);
    } else {
      button.classList.add("wrong");
      const card = document.querySelector("#gameScreen .farm-card");
      card.classList.add("shake-bad");
      setTimeout(() => card.classList.remove("shake-bad"), 300);
      messageArea.innerHTML = "❌ OOPS! Try again! 🐾";
      messageArea.style.background = "#ffe0db";

      setTimeout(() => {
        if (button && button.classList) {
          button.classList.remove("wrong");
          button.style.pointerEvents = "auto";
          button.disabled = false;
        }
      }, 800);
    }
  }

  function finishLevel() {
    if (!gameActive) return;
    gameActive = false;
    answered = true;
    clearLevelTimeout();
    stopCurrentAudio();
    clearPeekBlur();

    const nextLevel = levels[currentLevelIndex + 1];
    if (nextLevel && !nextLevel.unlocked) {
      nextLevel.unlocked = true;
    }

    const perfect = (currentScore === currentQuestions.length) ? " 🌟 PERFECT FARMER!" : "";
    messageArea.innerHTML = `🏆 Level Complete! 🏆 <br> Score: ${currentScore}/${currentQuestions.length} ${perfect}`;
    messageArea.style.background = "#ffe5b4";

    document.querySelectorAll(".option").forEach(btn => {
      btn.style.pointerEvents = "none";
      btn.disabled = true;
    });

    setTimeout(() => {
      const next = levels[currentLevelIndex + 1];
      if (next && next.unlocked) {
        startLevel(currentLevelIndex + 1);
      } else {
        showScreen("menu");
        renderLevels();
      }
    }, 1800);
  }

  function exitToMenu() {
    clearLevelTimeout();
    stopCurrentAudio();
    clearPeekBlur();
    gameActive = false;
    answered = false;
    showScreen("menu");
    renderLevels();
  }

  function startGameFromLanding() {
    const inputName = document.getElementById("playerName");
    const name = inputName.value.trim();
    if (name === "") {
      alert("🐄 Please enter your name to start farming!");
      return;
    }
    playerName = name;
    displayNameSpan.textContent = playerName;
    levels[0].unlocked = true;
    levels[1].unlocked = false;
    levels[2].unlocked = false;
    renderLevels();
    showScreen("menu");
  }

  function peekEmoji() {
    if (!gameActive || answered) return;
    emojiEl.style.filter = "blur(4px)";
    setTimeout(() => {
      if (!answered && gameActive && emojiEl.style.filter === "blur(4px)") {
        emojiEl.style.filter = "";
      }
    }, 800);
  }

  // Event listeners
  startGameBtn.addEventListener("click", startGameFromLanding);
  soundBtn.addEventListener("click", playSoundForCurrent);
  exitToMenuBtn.addEventListener("click", exitToMenu);
  hintBtn.addEventListener("click", peekEmoji);

  // Inject shake animation
  const style = document.createElement("style");
  style.textContent = `
    .shake-bad {
      animation: gameShake 0.32s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
    @keyframes gameShake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }
    .option:active { transform: scale(0.96); }
  `;
  document.head.appendChild(style);

  renderLevels();
</script>
</body>
</html>
